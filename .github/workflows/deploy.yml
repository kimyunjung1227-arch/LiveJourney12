# https://kimyunjung1227-arch.github.io/LiveJourney12/ 배포
# Settings → Pages → Source: "GitHub Actions"
# Secrets: VITE_API_URL (Render 등 백엔드 https://.../api), Supabase·카카오맵 등

name: Deploy to GitHub Pages

env:
  # 일부 액션이 아직 v4 시절 Node 20 매니페스트를 가지고 있어 러너가 강제로 Node24로 끌어올림.
  # 그 안내 메시지(notice)는 차단할 수 없는 정보성 알림이며 빌드/배포에 영향 없음.
  # 사용 가능한 액션은 가능한 한 @v5(Node24 매니페스트)로 올려 경고를 줄였다.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          # 빌드/배포 단계에서 별도의 git 인증이 필요 없어 자격증명 영속화를 끈다.
          # (작년부터 종종 보이던 "/usr/bin/git failed with exit code 128" 경고 차단)
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          # 루트에 npm workspaces가 잡혀 있어(web/는 호이스팅 대상) 루트 lockfile을 사용.
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspaces root)
        run: npm ci --workspaces --include-workspace-root --ignore-scripts

      - name: Build
        env:
          # 서브경로 필수: /LiveJourney12/
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          # canonical·OG용 (저장소마다 자동)
          VITE_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_KAKAO_MAP_API_KEY: ${{ secrets.VITE_KAKAO_MAP_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}
        run: npm run build --workspace=web

      # 깊은 링크(직접 URL) 시 GitHub Pages가 404를 주므로 SPA 엔트리와 동일하게 맞춤
      - name: SPA 404 fallback (GitHub Pages)
        run: cp web/dist/index.html web/dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
