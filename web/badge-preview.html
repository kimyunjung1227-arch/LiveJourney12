const EARNED = { M:'#4DB8E8', D:'#2F87BC', A:'#8BD2F0', C:'#62BEEA', W:'#FFFFFF' };
const GRAY   = { M:'#B9C3CC', D:'#98A4B0', A:'#CFD6DC', C:'#C3CCD4', W:'#FFFFFF' };
const MED = {
  disc:'#FFFFFF', discLocked:'#F2F4F6',
  ringEarned:'#4DB8E8', ringMuted:'#CDD6DE',
  bandEarned:'#4DB8E8', bandMuted:'#D2DAE1', pip:'#FFFFFF',
};

function iconSvg(motif, palette, px){
  const inner = (PATHS[motif]||PATHS.honor).replace(/__([MDACW])__/g,(_,k)=>palette[k]);
  return `<svg width="${px}" height="${px}" viewBox="0 0 48 48" fill="none" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;
}

const CX=50, CY=43;
function pol(a,r){const t=a*Math.PI/180;return [CX+r*Math.cos(t), CY+r*Math.sin(t)];}

const KOFF=-95;
// 월계수 화환 — 하단을 감싸 측면으로 올라가는 아몬드형 잎
function laurel(color, angsL){
  const R=37, len=8.5, w=2.9, L=len/2;
  function branch(angs, sweep, mir){
    const p0=pol(angs[0],R-2.5), p1=pol(angs[angs.length-1],R-2.5);
    let str=`<path d="M${p0[0].toFixed(1)} ${p0[1].toFixed(1)} A ${R-2.5} ${R-2.5} 0 0 ${sweep} ${p1[0].toFixed(1)} ${p1[1].toFixed(1)}" stroke="${color}" stroke-width="1.8" fill="none" stroke-linecap="round"/>`;
    angs.forEach(a=>{
      const [px,py]=pol(a,R);
      const rot=mir? -(a+KOFF):(a+KOFF);
      str+=`<path d="M${-L} 0 Q 0 ${-w} ${L} 0 Q 0 ${w} ${-L} 0 Z" transform="translate(${px.toFixed(1)} ${py.toFixed(1)}) rotate(${rot.toFixed(1)})" fill="${color}"/>`;
    });
    return str;
  }
  return branch(angsL,1,false)+branch(angsL.map(a=>180-a),0,true);
}

// 하단 매듭(작은 띠) — 화환 두 가지가 만나는 지점
function knot(brand, deep){
  return `<rect x="43.5" y="79" width="13" height="6.2" rx="3.1" fill="${brand}"/>`+
    `<rect x="49" y="79" width="2" height="6.2" fill="${deep}" opacity="0.45"/>`;
}

function medallion(meta, state, size){
  const earned = state==='earned', locked = state==='locked';
  const level = Math.min(3, Math.max(1, meta.level||1));
  const isChain = !!meta.chainId;
  const borderDetail = isChain && level>=2;
  const crest = isChain && level>=3;
  const ring = earned ? MED.ringEarned : MED.ringMuted;
  const disc = locked ? MED.discLocked : MED.disc;
  const deco = earned ? '#4DB8E8' : '#CDD6DE';
  const decoDeep = earned ? '#2F87BC' : '#AEB8C0';
  const iconPx = Math.round(size*0.42);

  const laurelEl = crest ? laurel(deco,[94,107,120,133,146,159,172,185,198]) : '';
  const knotEl = crest ? knot(deco, decoDeep) : '';
  const ringInner = borderDetail
    ? `<circle cx="${CX}" cy="${CY}" r="26.5" fill="none" stroke="${ring}" stroke-width="1.7" opacity="0.55"/>`
    : '';

  const frame = `<svg width="${size}" height="${size}" viewBox="0 0 100 100" fill="none" style="position:absolute;inset:0;display:block">
    ${laurelEl}<circle cx="${CX}" cy="${CY}" r="32" fill="${disc}" stroke="${ring}" stroke-width="3"/>${ringInner}${knotEl}</svg>`;

  const center = locked
    ? `<svg width="${Math.round(size*0.3)}" height="${Math.round(size*0.3)}" viewBox="0 0 24 24" fill="#BFC8D1"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm3 8H9V6a3 3 0 0 1 6 0z"/></svg>`
    : iconSvg(meta.motif, earned?EARNED:GRAY, iconPx);

  return `<div style="position:relative;width:${size}px;height:${size}px;display:inline-flex;align-items:center;justify-content:center">
    ${frame}
    <div style="position:relative;margin-top:-${size*0.07}px;display:inline-flex">${center}</div>
  </div>`;
}

function cell(meta, state, label, sub, size){
  const tagCls = state==='earned' ? 'tag' : 'tag muted';
  return `<div class="cell">${medallion(meta,state,size||66)}
    <div class="name">${label||meta.name}</div>
    ${sub?`<div class="${tagCls}">${sub}</div>`:''}</div>`;
}

function row(html){ return `<div class="row">${html}</div>`; }
function section(title, body){ return `<h2>${title}</h2>${body}`; }

    cell({motif:'crowd',level:2},'earned','인파 리더','',72) +
    cell({motif:'store',level:2},'earned','단골 탐험가','',72)
  )}</div>`);

// 5) 지역 전체 갤러리
const regions = [
  ['seoul','서울'],['busan','부산'],['daegu','대구'],['incheon','인천'],['gwangju','광주'],
  ['daejeon','대전'],['ulsan','울산'],['sejong','세종'],['gyeonggi','경기'],['gangwon','강원'],
  ['chungbuk','충북'],['chungnam','충남'],['jeonbuk','전북'],['jeonnam','전남'],
  ['gyeongbuk','경북'],['gyeongnam','경남'],['jeju','제주']
];
html += section('지역 17종 (2단계 톡파원 기준)',
  `<div class="card">${row(
    regions.map(([m,n])=>cell({motif:m,level:2,chainId:'region_'+m},'earned',n+' 톡파원','',64)).join('')
  )}</div>`);

root.innerHTML = html;
</script>
