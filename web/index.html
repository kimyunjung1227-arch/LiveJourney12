<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <!-- index.html이 오래 캐시되면 이전 빌드의 /assets/*.js 해시를 요청 → 404 후 SPA가 HTML을 주면 MIME 모듈 오류가 난다. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <!-- 파비콘 없음: <link rel="icon"> 미사용 + /favicon.* 미배포 시 구글 검색 결과는 보통 회색 지구본(기본). 캐시 갱신까지 시간 소요 -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/splash-logo.png.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- 네이버 검색 결과 메인 설정 -->
  <title>라이브저니 - 실시간 여행 커뮤니티</title>
  <meta name="description" content="여행지의 실시간 상황을 확인하고 여행을 계획해보세요. 정보의 시차 없는 진짜 여행, 라이브저니와 함께하세요." />
  <meta name="keywords" content="라이브저니, LiveJourney, Live Journey, 실시간 핫플, 실시간 여행, 여행 커뮤니티, 여행지 인파, 혼잡도, 실시간 제보, 여행 정보, 날씨, 지도, 국내여행" />
  <meta name="robots" content="index, follow" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta name="application-name" content="라이브저니" />
  <meta name="apple-mobile-web-app-title" content="라이브저니" />
  <meta name="naver-site-verification" content="62a65e485ca25f64d6c26d91044b2ffc5e8a2f50" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:site_name" content="라이브저니" />
  <!-- SNS 공유 시 노출되는 정보 (Open Graph) -->
  <meta property="og:title" content="라이브저니 - 실시간 여행 커뮤니티" />
  <meta property="og:description" content="여행지의 실시간 상황을 확인하고 여행을 계획해보세요." />
  <meta property="og:url" content="__PUBLIC_BASE__" />
  <meta property="og:image" content="__PUBLIC_BASE__/splash-logo.png.png" />
  <meta property="og:image:alt" content="라이브저니" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="라이브저니 | 실시간 여행 핫플·인파·날씨 커뮤니티" />
  <meta name="twitter:description" content="여행지의 지금 인파·현장 분위기·날씨를 실시간 제보와 지도에서 확인하세요." />
  <!-- twitter:image 미지정: 검색/미리보기 썸네일 노출 최소화 -->
  <link rel="canonical" href="__PUBLIC_BASE__/" />
  <link rel="alternate" hreflang="ko" href="__PUBLIC_BASE__/" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="__PUBLIC_BASE__/sitemap.xml" />
  <link rel="alternate" type="application/rss+xml" title="라이브저니 RSS" href="__PUBLIC_BASE__/feed.xml" />
  <meta name="theme-color" content="#ff6b35" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "name": "라이브저니",
        "alternateName": ["Live Journey", "LiveJourney"],
        "url": "__PUBLIC_BASE__",
        "description": "여행지의 지금 인파·현장 분위기·날씨를 실시간 제보와 지도에서 확인하는 여행 커뮤니티(실시간 핫플/검색/지도).",
        "inLanguage": "ko",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "__PUBLIC_BASE__/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      },
      {
        "@type": "Organization",
        "name": "라이브저니",
        "alternateName": ["Live Journey", "LiveJourney"],
        "url": "__PUBLIC_BASE__",
        "description": "여행지의 지금 인파·현장 분위기·날씨를 실시간 제보와 지도에서 확인하는 여행 커뮤니티."
      }
    ]
  }
  </script>
  <!-- 네이버 사이트링크(서브 메뉴) 노출 확률을 높이기 위한 내비게이션 구조화 데이터 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "itemListElement": [
      {
        "@type": "SiteNavigationElement",
        "name": "실시간 핫플",
        "url": "__PUBLIC_BASE__/crowded-place",
        "description": "지금 이 순간 가장 반응이 뜨거운 여행지의 현장을 확인하세요."
      },
      {
        "@type": "SiteNavigationElement",
        "name": "실시간 피드",
        "url": "__PUBLIC_BASE__/realtime-feed",
        "description": "48시간 기준 최신 제보로 여행지의 지금을 확인하세요."
      },
      {
        "@type": "SiteNavigationElement",
        "name": "지도",
        "url": "__PUBLIC_BASE__/map",
        "description": "핀과 사진으로 주변 상황을 한눈에 확인하세요."
      },
      {
        "@type": "SiteNavigationElement",
        "name": "프로필",
        "url": "__PUBLIC_BASE__/profile",
        "description": "내 여행 기록과 커뮤니티 활동을 관리하세요."
      }
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+KR:wght@700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@400;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="dns-prefetch" href="https://dapi.kakao.com" />
  <link rel="preconnect" href="https://dapi.kakao.com" />
  <!-- KAKAO_MAP_SCRIPT -->
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 48
    }

    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- 검색엔진/크롤러용: JS 실행 전에도 읽을 수 있는 초기 본문(앱 로드 후 React가 교체) -->
    <main style="max-width: 820px; margin: 0 auto; padding: 28px 18px; font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans KR', Arial, sans-serif; color: #111827;">
      <h1 style="margin: 0 0 10px 0; font-size: 26px; line-height: 1.2; letter-spacing: -0.03em;">라이브저니 (LiveJourney)</h1>
      <p style="margin: 0 0 12px 0; color: #374151; line-height: 1.65;">
        여행지의 <strong>지금</strong> 인파·현장 분위기·날씨를 <strong>실시간 제보</strong>와 <strong>지도</strong>에서 확인하는 여행 커뮤니티입니다.
      </p>
      <ul style="margin: 0 0 16px 18px; color: #374151; line-height: 1.7;">
        <li>실시간 급상승 핫플: 지금 반응이 뜨거운 장소를 빠르게 확인</li>
        <li>지도: 핀/사진으로 주변 상황을 한눈에 보기</li>
        <li>검색: 장소·해시태그별 최신 제보 탐색</li>
      </ul>
      <nav aria-label="라이브저니 주요 메뉴" style="display:flex; gap:10px; flex-wrap:wrap;">
        <a href="/crowded-place" rel="nofollow" style="display:inline-block; padding:10px 14px; border-radius:9999px; background:#111827; color:#fff; text-decoration:none; font-weight:700;">실시간 핫플</a>
        <a href="/realtime-feed" rel="nofollow" style="display:inline-block; padding:10px 14px; border-radius:9999px; background:#eef2ff; color:#111827; text-decoration:none; font-weight:700;">실시간 피드</a>
        <a href="/map" rel="nofollow" style="display:inline-block; padding:10px 14px; border-radius:9999px; background:#ecfeff; color:#111827; text-decoration:none; font-weight:700;">지도</a>
        <a href="/profile" rel="nofollow" style="display:inline-block; padding:10px 14px; border-radius:9999px; background:#f1f5f9; color:#111827; text-decoration:none; font-weight:700;">프로필</a>
      </nav>
      <noscript>
        <p style="margin: 14px 0 0 0; font-size: 12px; color: #6b7280; line-height: 1.6;">
          이 사이트는 JavaScript가 필요합니다. JavaScript를 켠 뒤 다시 접속해주세요.
        </p>
      </noscript>
    </main>
  </div>
  <script type="module" src="./src/main.jsx"></script>
</body>

</html>
